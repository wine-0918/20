<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ff1493">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="五等分しおり">
    <link rel="apple-touch-icon" href="../../Pictures/5_sisters/miku.png">
    <title>五等分の花嫁 - しおり</title>
    <link rel="stylesheet" href="../css/quintuplets.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Noto+Serif+JP:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="../manifest-icon3.json">
</head>
<body>
    <button class="home-back-btn" onclick="location.href='quintuplets_home.html'">← ホームに戻る</button>
    
    <div class="container">
        <header class="page-header">
            <div class="decorative-line"></div>
            <h1 class="main-title">しおり</h1>
            <div class="decorative-line"></div>
            <button class="settings-button" id="openSettingsBtn">
                <span class="settings-icon">⚙</span>
                <span class="settings-text">設定</span>
            </button>
        </header>

        <nav class="day-selector">
            <button class="day-button active" data-day="1">1日目</button>
            <button class="day-button" data-day="2">2日目</button>
            <button class="day-button" data-day="3">3日目</button>
        </nav>

        <div class="schedule-content active" id="day-1"></div>
        <div class="schedule-content" id="day-2"></div>
        <div class="schedule-content" id="day-3"></div>
    </div>

    <!-- 設定モーダル -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">設定</h3>
                <button class="modal-close-btn" id="closeSettingsBtn">×</button>
            </div>
            
            <div class="modal-body">
                <!-- スケジュール設定 -->
                <div class="settings-section">
                    <h4 class="section-title">スケジュール設定</h4>
                    
                    <div class="filter-group">
                        <div class="filter-label">1日目の仕事</div>
                        <div class="filter-options">
                            <label class="filter-option">
                                <input type="radio" name="hasWork" value="true" checked>
                                <span>仕事あり</span>
                            </label>
                            <label class="filter-option">
                                <input type="radio" name="hasWork" value="false">
                                <span>仕事なし</span>
                            </label>
                        </div>
                    </div>

                    <div class="filter-group">
                        <div class="filter-label">3日目の昼ごはん</div>
                        <div class="filter-options">
                            <label class="filter-option">
                                <input type="radio" name="lunchOption" value="misokichi" checked>
                                <span>みそきん</span>
                            </label>
                            <label class="filter-option">
                                <input type="radio" name="lunchOption" value="redrock">
                                <span>レッドロック</span>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- 基本設定 -->
                <div class="settings-section">
                    <h4 class="section-title">基本設定</h4>
                    
                    <div class="checkbox-group">
                        <label class="checkbox-option">
                            <input type="checkbox" id="highlightCurrentTime" checked>
                            <span>現在時刻をハイライト</span>
                        </label>
                    </div>

                    <div class="checkbox-group">
                        <label class="checkbox-option">
                            <input type="checkbox" id="showCountdown" checked>
                            <span>カウントダウン表示</span>
                        </label>
                    </div>

                    <div class="checkbox-group">
                        <label class="checkbox-option">
                            <input type="checkbox" id="darkMode">
                            <span>ダークモード</span>
                        </label>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- メモモーダル -->
    <div class="modal-overlay" id="noteModal">
        <div class="modal-content note-modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="noteModalTitle">メモ</h3>
                <button class="modal-close-btn" id="closeNoteBtn">×</button>
            </div>
            
            <div class="modal-body">
                <div class="note-modal-info">
                    <div class="note-time" id="noteTime"></div>
                    <div class="note-event" id="noteEvent"></div>
                </div>
                <textarea 
                    id="noteTextarea" 
                    class="note-textarea" 
                    placeholder="ここにメモを入力...&#10;例：&#10;• 写真を撮る&#10;• 〇〇を買う&#10;• △△に注意"
                    rows="10"
                ></textarea>
                <div class="note-modal-actions">
                    <button class="note-save-btn" id="saveNoteBtn">保存</button>
                    <button class="note-clear-btn" id="clearNoteBtn">クリア</button>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/quintuplets.js"></script>
</body>
</html>
