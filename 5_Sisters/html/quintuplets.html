<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五等分の花嫁 - しおり</title>
    <link rel="stylesheet" href="../css/quintuplets.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Noto+Serif+JP:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <button class="home-back-btn" onclick="location.href='quintuplets_home.html'">← ホームに戻る</button>
    
    <div class="container">
        <header class="page-header">
            <div class="decorative-line"></div>
            <h1 class="main-title">しおり</h1>
            <p class="event-info" id="event-title">読み込み中...</p>
            <div class="event-details">
                <p class="venue" id="event-venue">-</p>
                <p class="time" id="event-time">開場 - / 開演 -</p>
                <a href="#" target="_blank" class="event-link" id="event-link">イベント詳細 →</a>
            </div>
            <div class="decorative-line"></div>
        </header>

        <nav class="day-selector">
            <button class="day-button active" data-day="1">1日目</button>
            <button class="day-button" data-day="2">2日目</button>
            <button class="day-button" data-day="3">3日目</button>
        </nav>

        <div class="schedule-content active" id="day-1"></div>
        <div class="schedule-content" id="day-2"></div>
        <div class="schedule-content" id="day-3"></div>
    </div>

    <script src="../js/quintuplets.js"></script>
</body>
</html>
