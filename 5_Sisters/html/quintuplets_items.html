<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五等分の花嫁 - 持ち物</title>
    <link rel="stylesheet" href="../css/quintuplets_items.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Noto+Serif+JP:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <button class="home-back-btn" onclick="location.href='quintuplets_home.html'">← ホームに戻る</button>
    
    <div class="container">
        <header class="page-header">
            <div class="decorative-line"></div>
            <h1 class="main-title">持ち物</h1>
            <p class="subtitle">Packing List</p>
            <div class="decorative-line"></div>
        </header>

        <nav class="bag-selector">
            <button class="bag-button active" data-bag="backpack">🎒 リュック</button>
            <button class="bag-button" data-bag="suitcase">🧳 スーツケース</button>
            <button class="bag-button" data-bag="tote">👜 手提げ</button>
        </nav>

        <div class="items-content active" id="backpack-items"></div>
        <div class="items-content" id="suitcase-items"></div>
        <div class="items-content" id="tote-items"></div>
    </div>

    <script src="../js/quintuplets_items.js"></script>
</body>
</html>
